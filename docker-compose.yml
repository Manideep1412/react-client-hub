services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: "Data Source=/app/data/clienthub.db"
      Jwt__Key: "ClientHub_SuperSecret_JWT_Key_2024_Min32Chars!"
      Jwt__Issuer: "ClientHub.API"
      Jwt__Audience: "ClientHub.App"
      AllowedOrigins__0: "http://localhost:3000"
    volumes:
      - sqlite_data:/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  sqlite_data:
